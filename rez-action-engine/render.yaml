services:
  - type: web
    name: rez-action-engine
    env: node
    region: mumbai
    plan: free
    buildCommand: npm install
    startCommand: npx ts-node src/index-adaptive.ts
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: FEEDBACK_SERVICE_URL
        value: https://rez-feedback-service.onrender.com
