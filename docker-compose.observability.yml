# ============================================================
# REZ Ecosystem — Observability Stack
# ============================================================
# Includes: Prometheus, Grafana, Loki, Promtail, Jaeger
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
# ============================================================

services:
  # ── Prometheus ─────────────────────────────────────────────
  # Metrics collection and storage
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: rez-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - observability

  # ── Grafana ───────────────────────────────────────────────
  # Metrics visualization and dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: rez-grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123  # Change in production!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - observability

  # ── Loki ─────────────────────────────────────────────────
  # Log aggregation
  loki:
    image: grafana/loki:2.8.0
    container_name: rez-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3100/ready']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - observability

  # ── Promtail ─────────────────────────────────────────────
  # Log collection (scrapes logs from other containers)
  promtail:
    image: grafana/promtail:2.8.0
    container_name: rez-promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability

  # ── Jaeger ───────────────────────────────────────────────
  # Distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: rez-jaeger
    restart: unless-stopped
    ports:
      - '16686:16686'  # UI
      - '14268:14268'  # Collector
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:16686/']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - observability

  # ── Alertmanager ─────────────────────────────────────────
  # Alert routing and notification
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: rez-alertmanager
    restart: unless-stopped
    ports:
      - '9093:9093'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - observability

# ── Volumes ────────────────────────────────────────────────
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local

# ── Networks ────────────────────────────────────────────────
networks:
  observability:
    name: rez-observability
    driver: bridge
