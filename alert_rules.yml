# Prometheus Alert Rules
# Defines alerts for REZ ecosystem services

groups:
  - name: rez_services
    interval: 30s
    rules:
      # Service is down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"

      # High error rate
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total[5m])) by (job) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%)"

      # High latency p99
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "p99 latency is {{ $value | humanizeDuration }} (threshold: 2s)"

      # Database connection issues
      - alert: DatabaseConnectionErrors
        expr: |
          sum(rate(mongodb_connection_errors_total[5m])) by (job) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection errors on {{ $labels.job }}"
          description: "{{ $value }} connection errors per second"

      # Redis connection issues
      - alert: RedisConnectionErrors
        expr: |
          sum(rate(redis_connection_errors_total[5m])) by (job) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis connection issues on {{ $labels.job }}"
          description: "{{ $value }} connection errors per second"

  - name: infrastructure
    interval: 30s
    rules:
      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      # Disk space low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"
          description: "Disk space is {{ $value | humanizePercentage }}"

  - name: auth_service
    interval: 30s
    rules:
      # Failed OTP attempts spike
      - alert: OTPFailureSpike
        expr: |
          sum(rate(otp_verification_failures_total[5m])) by (job) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "OTP failure spike on {{ $labels.job }}"
          description: "{{ $value }} failed OTP attempts per second"

      # Token validation failures
      - alert: TokenValidationFailures
        expr: |
          sum(rate(jwt_validation_failures_total[5m])) by (job) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Token validation failures on {{ $labels.job }}"
          description: "{{ $value }} validation failures per second"
