# Alertmanager Configuration
# Routes alerts to notification channels

global:
  resolve_timeout: 5m

# Route alerts by severity
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    # Critical alerts go to PagerDuty immediately
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true

    # Warning alerts go to Slack
    - match:
        severity: warning
      receiver: 'slack'

# Receivers
receivers:
  - name: 'default'
    # Fallback receiver (logs to stdout)
    webhook_configs:
      - url: 'http://localhost:3001/webhook'

  - name: 'slack'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts'
        send_resolved: true
        title: |
          [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.job }}
          {{ end }}

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: critical
        send_resolved: true
        client: 'REZ Ecosystem'
        details:
          - key: severity
            value: critical
          - key: service
            value: REZ Platform
