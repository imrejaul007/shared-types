services:
  - type: web
    name: rez-event-platform
    env: node
    region: mumbai
    plan: free
    buildCommand: npm install
    startCommand: npx ts-node src/index-simple.ts
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: ACTION_ENGINE_URL
        value: https://rez-action-engine.onrender.com
