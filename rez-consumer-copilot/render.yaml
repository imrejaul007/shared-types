services:
  - type: web
    name: rez-consumer-copilot
    env: node
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4021
      - key: MONGODB_URI
        sync: false
