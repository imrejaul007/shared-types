# Redis Sentinel Configuration
# Generated for REZ Ecosystem

# Sentinel configuration
port 26379
dir /tmp

# Monitor the primary
sentinel monitor mymaster redis-primary 6379 2

# Authentication
sentinel requirepass sentinel_password
sentinel auth-pass mymaster redis_primary_password

# Failover settings
sentinel down-after-milliseconds mymaster 3000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 18000

# Notification (optional)
# sentinel notification-script mymaster /scripts/notify.sh

# Client configuration (don't reconfig clients after failover)
sentinel deny-scripts-reconfig yes
